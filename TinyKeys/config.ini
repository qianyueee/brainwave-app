# Isomorphic Keyboard Configuration
# Configure starting pitch for each row using standard MIDI note names (e.g. C2, D#4, F5)
# Supported notes: C, C#, D, D#, E, F, F#, G, G#, A, A#, B
# Supported octaves: 2-7

# Number row (Red)
row0_start=A1

# Letter row 1 (Yellow)
row1_start=D2

# Letter row 2 (Blue)
row2_start=G2

# Letter row 3 (Green)
row3_start=C3

# Audio configuration
# Adjust note release time in milliseconds (sustain effect)
release_time_ms=100
