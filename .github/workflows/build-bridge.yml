name: Build Bridge (Windows)

# Builds the Windows .exe of the PC bridge so end users don't need Python.
# Run it manually from the Actions tab ("Run workflow"), or push a tag like
# `bridge-v1.0`. Download the result from the run's Artifacts (or the Release).

on:
  workflow_dispatch:
  push:
    tags:
      - "bridge-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bridge/requirements.txt pyinstaller

      - name: Build exe
        working-directory: bridge
        run: pyinstaller BrainLinkBridge.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrainLinkBridge-windows
          path: bridge/dist/BrainLinkBridge.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/bridge-v')
        uses: softprops/action-gh-release@v2
        with:
          files: bridge/dist/BrainLinkBridge.exe
